name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      
      - name: Lint with ruff
        run: |
          # Check all Python files with relaxed rules for demo code
          ruff check . --select E,F,W --ignore E501
        continue-on-error: false
      
      - name: Validate Python syntax
        run: |
          # Ensure all Python files are syntactically valid
          find . -name "*.py" -not -path "*/.venv/*" -not -path "*/venv/*" -exec python -m py_compile {} +

  install-shared-module:
    name: Install Shared Module
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install shared capiscio_events module
        run: |
          cd shared
          pip install -e .
      
      - name: Verify import
        run: |
          python -c "from capiscio_events import EventEmitter, EventType, EventSeverity; print('✓ Shared module imports successfully')"

  install-agent-dependencies:
    name: Install ${{ matrix.agent }} Dependencies
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: [langchain-agent, crewai-agent, langgraph-agent]
        python-version: ['3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'agents/${{ matrix.agent }}/requirements.txt'
      
      - name: Install shared module first
        run: |
          cd shared
          pip install -e .
      
      - name: Install ${{ matrix.agent }} dependencies
        run: |
          cd agents/${{ matrix.agent }}
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify imports
        run: |
          cd agents/${{ matrix.agent }}
          # Test that main.py can be imported (without running server)
          python -c "import sys; import main; print('✓ ${{ matrix.agent }} imports successfully')"

  validate-agent-cards:
    name: Validate Agent Cards
    runs-on: ubuntu-latest
    if: false  # Disabled for now - would require agents to be running
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Future: Use validate-a2a action to check agent card schema
      # when agents can be started without API keys
      - name: Placeholder
        run: echo "Agent card validation - to be implemented"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, install-shared-module, install-agent-dependencies]
    if: always()
    
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.install-shared-module.result }}" = "failure" ] || \
             [ "${{ needs.install-agent-dependencies.result }}" = "failure" ]; then
            echo "❌ CI checks failed"
            exit 1
          else
            echo "✅ All CI checks passed"
          fi
